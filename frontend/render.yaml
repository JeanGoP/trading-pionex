services:
  - type: web
    name: trading-pionex-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PIONEX_API_KEY
        sync: false
      - key: PIONEX_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NEWS_RSS_URLS
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
